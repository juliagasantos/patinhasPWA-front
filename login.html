<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/login.css" />
    <title>Document</title>
    <link


      href="https://fonts.googleapis.com/css2?family=Lexend&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=ABeeZee:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <div id="container-logo">
        <img src="./img/logo.png" alt="Patinhas Mágicas" />
      </div>

      <!-- frase login -->
      <div id="container-frase-login">
        <ul>
          <li>
            <p>Tudo para seu</p>
            <p>Melhor amigo!</p>
          </li>
        </ul>
      </div>

      <!-- login -->
      <div id="container-login">
        <!-- form -->
        <form>
          <div class="title">
            <ul>
              <li>
                <p>Login</p>
              </li>
            </ul>
          </div>
          <div class="container-form">
            <ul>
              <li>
                <p>Email</p>
              </li>
            </ul>
            <input @bind="email" placeholder="Email" />
          </div>

          <div class="container-form">
            <ul>
              <li>
                <p>Senha</p>
              </li>
            </ul>
            <input type="password" @bind="senha" placeholder="Senha" />
          </div>
        </form>

        <div class="entrar-recuperar">
          <button @onclick="FazerLogin">Entrar</button>
          <a href="#">Recuperar senha</a>
        </div>
      </div>
    </main>
    <!-- imagem -->
  </body>
</html>
