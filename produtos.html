<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/produtos.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Lexend&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=ABeeZee:ital@0;1&display=swap" rel="stylesheet" />
</head>

<body>

    <main>
        <section id="product-section">
            <div class="title-product">
                <ul>
                    <li>
                        <p>Nossos Produtos</p>
                        <p>As melhores ofertas para seu pet</p>
                    </li>
                </ul>
            </div>




            <div class="card-product-bg">

                <div class="card-product">
                    <div class="img-card">
                        <img src="./img/product-accessories.jpg" alt="Ração Patinhas Mágicas" />
                    </div>

                </div>

                <div class="card-product">
                    <div class="img-card">
                        <img src="./img/product-food.jpg" alt="Ração Patinhas Mágicas" />
                    </div>
                    <div class="info-card">
                        <ul>
                            <li>
                                <!-- Filtrar por categoria -->
                                <p>Rações</p>
                                <p>As melhores marcas</p>
                            </li>
                        </ul>
                    </div>
                    <div class="btn-card">
                        <button>Ver Mais</button>
                    </div>
                </div>


                <div class="card-product">
                    <div class="img-card">
                        <img src="./img/product-toys.jpg" alt="Ração Patinhas Mágicas" />
                    </div>
                </div>

            </div>

        </section>
    </main>

</body>

</html>
