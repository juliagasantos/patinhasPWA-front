<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Lexend&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=ABeeZee:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/editarAnimal.css">
</head>

<body>
    <main>
        <form class="card-form">
            <ul>
                <li>
                    <p class="title">Cadastro de Animal</p>
                </li>
            </ul>


            <div class="field">
                <ul>
                    <li>
                        <p class="label">Alterar nome</p>
                        <input type="text" class="input-real" placeholder="Digite o nome do animal" required />
                    </li>
                </ul>
            </div>


            <div class="field">
                <ul>
                    <li>
                        <p class="label">Alterar espécie *</p>
                        <select class="input-select" required>
                            <option value="">Selecione</option>
                            <option>Cachorro</option>
                            <option>Gato</option>
                        </select>
                    </li>
                </ul>
            </div>


            <div class="field">
                <ul>
                    <li>
                        <p class="label">Alterar raça</p>
                        <input type="text" class="input-real" placeholder="Ex: Poodle, Siamês..." />
                    </li>
                </ul>
            </div>


            <div class="field">
                <ul>
                    <li>
                        <p class="label">Alterar idade</p>
                        <input type="number" class="input-real" placeholder="0" min="0" />
                    </li>
                </ul>
            </div>


            <div class="field">
                <ul>
                    <li>
                        <p class="label">Tamanho *</p>
                        <select class="input-select" required>
                            <option value="">Selecione</option>
                            <option>Pequeno</option>
                            <option>Médio</option>
                            <option>Grande</option>
                        </select>
                    </li>
                </ul>
            </div>


            <div class="actions">
                <button type="button" class="cancel">Cancelar</button>
                <button type="button" class="confirm">Confirmar alteração</button>

                <button type="submit" class="btn-primary">Alterar dados</button>
            </div>
        </form>
    </main>

</body>

</html>
