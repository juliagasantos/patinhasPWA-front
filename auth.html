<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Lexend&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=ABeeZee:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>
  <body>
    <main>
      <div id="container-initial">
        <div class="container-logo">
          <img src="./img/logo-bg-index.png" alt="Patinhas Mágicas" />
        </div>
        <div id="container">
          <div class="container-title">
            <ul>
              <li>
                <p>Bem-vindos ao</p>
                <p>Patinhas Mágicas</p>
              </li>
            </ul>
          </div>

          <div class="container-sub-title">
            <ul>
              <li>
                <p>Cuidando do seu pet com carinho, qualidade e confiança.</p>
              </li>
            </ul>
          </div>

          <div class="button-initial">
            <button @onclick="Login">Login</button>
            <button @onclick="Cadastrar">Cadastrar</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
